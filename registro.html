<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 15px; padding: 40px; max-width: 500px; width: 100%; }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        .success { display: none; background: #d4edda; color: #155724; padding: 20px; border-radius: 8px; text-align: center; }
        .success h2 { margin-bottom: 10px; }
        .alert { padding: 10px; background: #d1ecf1; color: #0c5460; border-radius: 6px; margin-bottom: 15px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 ¡Bienvenido!</h1>
        <p>Regístrate en 30 segundos</p>

        <div class="alert">
            ✅ Solo necesitamos tu nombre y teléfono WhatsApp
        </div>

        <div id="form">
            <div class="form-group">
                <label>Tu nombre</label>
                <input type="text" id="nombre" placeholder="Juan Pérez" required>
            </div>

            <div class="form-group">
                <label>Tu teléfono WhatsApp</label>
                <input type="tel" id="telefono" placeholder="+51 999 999 999" required>
            </div>

            <div class="form-group">
                <label>¿Cuál app quieres?</label>
                <select id="app" required>
                    <option value="">--Selecciona--</option>
                </select>
            </div>

            <button onclick="registrar()">Registrarme</button>
        </div>

        <div class="success" id="success">
            <h2>✅ ¡Registrado!</h2>
            <p>El administrador te contactará pronto con tu código de acceso.</p>
        </div>
    </div>

    <script>
        let apps = JSON.parse(localStorage.getItem('apps')) || [];
        let clientes = JSON.parse(localStorage.getItem('clientes')) || [];

        function cargarApps() {
            const select = document.getElementById('app');
            if (apps.length === 0) {
                select.innerHTML = '<option value="">Sin apps disponibles</option>';
            } else {
                select.innerHTML = '<option value="">--Selecciona--</option>' + 
                    apps.map(a => `<option value="${a.id}|${a.nombre}|${a.precio}">${a.nombre} (S/ ${a.precio}/mes)</option>`).join('');
            }
        }

        function registrar() {
            const nombre = document.getElementById('nombre').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const appSeleccionada = document.getElementById('app').value;

            if (!nombre || !telefono || !appSeleccionada) {
                alert('⚠️ Completa todos los campos');
                return;
            }

            const [appId, appNombre, appPrecio] = appSeleccionada.split('|');

            const cliente = {
                id: Date.now(),
                nombre,
                telefono,
                appId: parseInt(appId),
                app: appNombre,
                precio: parseInt(appPrecio),
                wa_link: `https://wa.me/${telefono.replace(/[^0-9]/g, '')}`,
                fecha: new Date().toISOString()
            };

            clientes.push(cliente);
            localStorage.setItem('clientes', JSON.stringify(clientes));

            document.getElementById('form').style.display = 'none';
            document.getElementById('success').style.display = 'block';

            console.log('Cliente registrado:', cliente);
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'apps') {
                apps = JSON.parse(e.newValue) || [];
                cargarApps();
            }
        });

        cargarApps();
    </script>
</body>
</html>
