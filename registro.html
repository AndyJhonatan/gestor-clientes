<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrate</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 15px; padding: 40px; max-width: 500px; width: 100%; }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .success { display: none; background: #d4edda; color: #155724; padding: 20px; border-radius: 8px; text-align: center; }
        .success h2 { margin-bottom: 10px; }
        .alert { padding: 10px; background: #d1ecf1; color: #0c5460; border-radius: 6px; margin-bottom: 15px; font-size: 12px; }
        .error { padding: 10px; background: #f8d7da; color: #721c24; border-radius: 6px; margin-bottom: 15px; font-size: 12px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 ¡Bienvenido!</h1>
        <p>Regístrate en 30 segundos</p>

        <div class="alert">
            ✅ Solo necesitamos tu nombre y teléfono WhatsApp
        </div>

        <div id="error-msg" class="error"></div>

        <div id="form">
            <div class="form-group">
                <label>Tu nombre completo *</label>
                <input type="text" id="nombre" placeholder="Juan Pérez" required>
            </div>

            <div class="form-group">
                <label>Tu teléfono WhatsApp *</label>
                <input type="tel" id="telefono" placeholder="+51 999 999 999" required>
            </div>

            <button id="btn-registrar" onclick="registrar()">Registrarme</button>
        </div>

        <div class="success" id="success">
            <h2>✅ ¡Registrado!</h2>
            <p>El administrador te contactará pronto con tu código de acceso.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://opmbftaczdrvizroaeew.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Zv8dGqKjGDX7wedV7KLicA_hmtFRxPj';
        
        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function registrar() {
            const nombre = document.getElementById('nombre').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const errorDiv = document.getElementById('error-msg');
            const btn = document.getElementById('btn-registrar');

            errorDiv.style.display = 'none';

            if (!nombre || !telefono) {
                errorDiv.textContent = '⚠️ Completa todos los campos';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                btn.disabled = true;
                btn.textContent = 'Registrando...';

                const { data, error } = await supabase
                    .from('clientes')
                    .insert([{
                        nombre,
                        telefono,
                        app: 'Sin asignar',
                        app_id: null,
                        wa_link: `https://wa.me/${telefono.replace(/[^0-9]/g, '')}`,
                        fecha_registro: new Date().toISOString()
                    }]);

                if (error) throw error;

                document.getElementById('form').style.display = 'none';
                document.getElementById('success').style.display = 'block';

                console.log('Cliente registrado:', data);
            } catch (err) {
                console.error('Error:', err);
                errorDiv.textContent = '❌ Error al registrar. Intenta de nuevo.';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Registrarme';
            }
        }
    </script>
</body>
</html>
