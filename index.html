<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Clientes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 15px; padding: 40px; max-width: 500px; width: 100%; position: relative; }
        .admin-btn { position: absolute; top: 15px; right: 15px; background: #667eea; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .admin-btn:hover { background: #5568d3; transform: scale(1.1); }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        .success { display: none; background: #d4edda; color: #155724; padding: 20px; border-radius: 8px; text-align: center; }
        .success h2 { margin-bottom: 10px; }
        .alert { padding: 10px; background: #d1ecf1; color: #0c5460; border-radius: 6px; margin-bottom: 15px; font-size: 12px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 40px; border-radius: 15px; max-width: 400px; width: 100%; }
        .modal-content h2 { margin-bottom: 20px; color: #333; }
        .modal-content input { margin-bottom: 10px; }
        .modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .modal-buttons button { margin: 0; }
        .modal-buttons button.cancel { background: #ddd; color: #333; }
        .modal-buttons button.cancel:hover { background: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <button class="admin-btn" onclick="abrirAdmin()">⚙️</button>

        <h1>🎉 ¡Bienvenido!</h1>
        <p>Regístrate en 30 segundos</p>

        <div class="alert">
            ✅ Solo necesitamos tu nombre y teléfono WhatsApp
        </div>

        <div id="form">
            <div class="form-group">
                <label>Tu nombre completo *</label>
                <input type="text" id="nombre" placeholder="Juan Pérez" required>
            </div>

            <div class="form-group">
                <label>Tu teléfono WhatsApp *</label>
                <input type="tel" id="telefono" placeholder="+51 999 999 999" required>
            </div>

            <button onclick="registrar()">Registrarme</button>
        </div>

        <div class="success" id="success">
            <h2>✅ ¡Registrado!</h2>
            <p>El administrador te contactará pronto con tu código de acceso.</p>
        </div>
    </div>

    <!-- Modal de contraseña -->
    <div id="modal-admin" class="modal">
        <div class="modal-content">
            <h2>🔐 Acceso Admin</h2>
            <input type="password" id="password-input" placeholder="Ingresa la contraseña" onkeypress="if(event.key==='Enter') verificarPassword()">
            <div class="modal-buttons">
                <button class="cancel" onclick="cerrarModal()">Cancelar</button>
                <button onclick="verificarPassword()">Entrar</button>
            </div>
        </div>
    </div>

    <script>
        let clientes = JSON.parse(localStorage.getItem('clientes')) || [];
        const CONTRASEÑA_ADMIN = 'admin123';

        function registrar() {
            const nombre = document.getElementById('nombre').value.trim();
            const telefono = document.getElementById('telefono').value.trim();

            if (!nombre || !telefono) {
                alert('⚠️ Completa todos los campos');
                return;
            }

            const cliente = {
                id: Date.now(),
                nombre,
                telefono,
                app: 'Sin asignar',
                wa_link: `https://wa.me/${telefono.replace(/[^0-9]/g, '')}`,
                fecha: new Date().toISOString()
            };

            clientes.push(cliente);
            localStorage.setItem('clientes', JSON.stringify(clientes));

            document.getElementById('form').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        }

        function abrirAdmin() {
            document.getElementById('modal-admin').classList.add('active');
            document.getElementById('password-input').focus();
        }

        function cerrarModal() {
            document.getElementById('modal-admin').classList.remove('active');
            document.getElementById('password-input').value = '';
        }

        function verificarPassword() {
            const password = document.getElementById('password-input').value;
            if (password === CONTRASEÑA_ADMIN) {
                window.location.href = 'admin.html';
            } else {
                alert('❌ Contraseña incorrecta');
                document.getElementById('password-input').value = '';
            }
        }

        // Cerrar modal al hacer clic fuera
        document.getElementById('modal-admin').addEventListener('click', function(e) {
            if (e.target === this) cerrarModal();
        });
    </script>
</body>
</html>
