<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Clientes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 15px; padding: 40px; max-width: 500px; width: 100%; position: relative; }
        .admin-btn { position: absolute; top: 15px; right: 15px; background: #667eea; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .admin-btn:hover { background: #5568d3; transform: scale(1.1); }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .success { display: none; background: #d4edda; color: #155724; padding: 20px; border-radius: 8px; text-align: center; }
        .success h2 { margin-bottom: 10px; }
        .alert { padding: 10px; background: #d1ecf1; color: #0c5460; border-radius: 6px; margin-bottom: 15px; font-size: 12px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 40px; border-radius: 15px; max-width: 400px; width: 100%; }
        .modal-content h2 { margin-bottom: 20px; color: #333; }
        .modal-content input { margin-bottom: 10px; }
        .modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .modal-buttons button { margin: 0; }
        .modal-buttons button.cancel { background: #ddd; color: #333; }
        .modal-buttons button.cancel:hover { background: #ccc; }
        .correos-info { background: #f0f0f0; padding: 10px; border-radius: 6px; margin: 8px 0; font-size: 12px; }
        .correos-info .correo-item { background: white; padding: 6px; margin: 4px 0; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { background: #667eea; color: white; border: none; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; }
        .copy-btn:hover { background: #5568d3; }
        .copy-btn.copied { background: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <button class="admin-btn" onclick="abrirAdmin()">⚙️</button>

        <h1>🎉 ¡Bienvenido!</h1>
        <p>Regístrate en 30 segundos</p>

        <div class="alert">
            ✅ Solo necesitamos tu nombre, teléfono y la app que deseas
        </div>

        <div id="form">
            <div class="form-group">
                <label>Tu nombre completo *</label>
                <input type="text" id="nombre" placeholder="Juan Pérez" required>
            </div>

            <div class="form-group">
                <label>Tu teléfono WhatsApp *</label>
                <input type="tel" id="telefono" placeholder="+51 999 999 999" required>
            </div>

            <div class="form-group">
                <label>¿Qué app deseas? *</label>
                <select id="app-elegida" onchange="actualizarCorreos()">
                    <option value="">--Selecciona una app--</option>
                </select>
            </div>

            <div id="correos-container" style="display: none;">
                <div class="form-group">
                    <label>Correo disponible (si es compartida) *</label>
                    <select id="correo-elegido">
                        <option value="">--Selecciona un correo--</option>
                    </select>
                </div>
                <div id="info-correos" class="correos-info" style="display: none;"></div>
            </div>

            <button id="btn-registrar" onclick="registrar()">Registrarme</button>
        </div>

        <div class="success" id="success">
            <h2>✅ ¡Registrado!</h2>
            <p>El administrador te contactará pronto con tu código de acceso.</p>
        </div>
    </div>

    <!-- Modal de contraseña -->
    <div id="modal-admin" class="modal">
        <div class="modal-content">
            <h2>🔐 Acceso Admin</h2>
            <input type="password" id="password-input" placeholder="Ingresa la contraseña" onkeypress="if(event.key==='Enter') verificarPassword()">
            <div class="modal-buttons">
                <button class="cancel" onclick="cerrarModal()">Cancelar</button>
                <button onclick="verificarPassword()">Entrar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://opmbftaczdrvizroaeew.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Zv8dGqKjGDX7wedV7KLicA_hmtFRxPj';
        const CONTRASEÑA_ADMIN = '552083Aa';
        
        const { createClient } = window.supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_KEY);

        let apps = [];
        let appCorreos = {};

        async function cargarApps() {
            try {
                const { data, error } = await db.from('apps').select('*');
                if (error) throw error;
                apps = data || [];
                appCorreos = JSON.parse(localStorage.getItem('appCorreos')) || {};
                renderApps();
            } catch (err) {
                console.error('Error:', err);
            }
        }

        function renderApps() {
            const select = document.getElementById('app-elegida');
            select.innerHTML = '<option value="">--Selecciona una app--</option>';
            apps.forEach(app => {
                const option = document.createElement('option');
                option.value = app.id;
                option.textContent = app.nombre;
                select.appendChild(option);
            });
        }

        function actualizarCorreos() {
            const appId = document.getElementById('app-elegida').value;
            const correosContainer = document.getElementById('correos-container');
            const correosSelect = document.getElementById('correo-elegido');
            const infoCorreos = document.getElementById('info-correos');

            correosSelect.innerHTML = '<option value="">--Selecciona un correo--</option>';
            infoCorreos.style.display = 'none';

            if (!appId) {
                correosContainer.style.display = 'none';
                return;
            }

            const app = apps.find(a => a.id == appId);
            const correos = appCorreos[appId] || [];

            if (app && app.tipo === 'shared' && correos.length > 0) {
                correosContainer.style.display = 'block';
                correos.forEach(correo => {
                    const option = document.createElement('option');
                    option.value = correo;
                    option.textContent = correo;
                    correosSelect.appendChild(option);
                });

                let html = '<strong>📧 Correos disponibles:</strong><br>';
                correos.forEach(correo => {
                    html += `<div class="correo-item">
                        <span>${correo}</span>
                        <button class="copy-btn" onclick="copiarCorreo('${correo}')">📋 Copiar</button>
                    </div>`;
                });
                infoCorreos.innerHTML = html;
                infoCorreos.style.display = 'block';
            } else {
                correosContainer.style.display = 'none';
            }
        }

        function copiarCorreo(correo) {
            navigator.clipboard.writeText(correo).then(() => {
                alert('✅ Correo copiado');
            });
        }

        async function registrar() {
            const nombre = document.getElementById('nombre').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const appId = document.getElementById('app-elegida').value;
            const correo = document.getElementById('correo-elegido').value;

            if (!nombre || !telefono || !appId) {
                alert('⚠️ Completa todos los campos');
                return;
            }

            const app = apps.find(a => a.id == appId);
            if (app && app.tipo === 'shared' && !correo) {
                alert('⚠️ Selecciona un correo');
                return;
            }

            try {
                const btn = document.getElementById('btn-registrar');
                btn.disabled = true;
                btn.textContent = 'Registrando...';

                const { data, error } = await db
                    .from('clientes')
                    .insert([{
                        nombre,
                        telefono,
                        app: app.nombre,
                        app_id: appId,
                        correo: correo || null,
                        wa_link: `https://wa.me/${telefono.replace(/[^0-9]/g, '')}`,
                        fecha_registro: new Date().toISOString()
                    }]);

                if (error) throw error;

                document.getElementById('form').style.display = 'none';
                document.getElementById('success').style.display = 'block';

            } catch (err) {
                console.error('Error:', err);
                alert('❌ Error al registrar: ' + err.message);
                document.getElementById('btn-registrar').disabled = false;
                document.getElementById('btn-registrar').textContent = 'Registrarme';
            }
        }

        function abrirAdmin() {
            document.getElementById('modal-admin').classList.add('active');
            document.getElementById('password-input').focus();
        }

        function cerrarModal() {
            document.getElementById('modal-admin').classList.remove('active');
            document.getElementById('password-input').value = '';
        }

        function verificarPassword() {
            const password = document.getElementById('password-input').value;
            if (password === CONTRASEÑA_ADMIN) {
                window.location.href = 'admin.html';
            } else {
                alert('❌ Contraseña incorrecta');
                document.getElementById('password-input').value = '';
            }
        }

        document.getElementById('modal-admin').addEventListener('click', function(e) {
            if (e.target === this) cerrarModal();
        });

        cargarApps();
    </script>
</body>
</html>
